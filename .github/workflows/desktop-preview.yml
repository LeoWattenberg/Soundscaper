name: Desktop preview and nightly

on:
  schedule:
    # Run from the default branch every night at 02:17 UTC. The offset avoids
    # the heavy load GitHub Actions commonly sees at the top of the hour.
    - cron: '17 2 * * *'
  push:
    tags:
      - 'v*-beta.*'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: desktop-preview-and-nightly-${{ github.ref }}
  cancel-in-progress: false

env:
  PUBLIC_AUDIO_EDITOR_V2: 'true'
  PUBLIC_FFMPEG_CORE_BASE_URL: https://assets.soundscaper.org/runtime/ffmpeg/0.12.10
  PUBLIC_TRANSLATIONS_BASE_URL: https://translations.soundscaper.org/runtime/translations/audacity/4

jobs:
  quality:
    runs-on: ubuntu-24.04
    timeout-minutes: 45
    steps:
      - name: Check out source
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Set up Node.js
        uses: actions/setup-node@395ad3262231945c25e8478fd5baf05154b1d79f # v6.1.0
        with:
          node-version: 22
          cache: npm

      - name: Require the tag to match package.json
        if: github.ref_type == 'tag'
        env:
          RELEASE_TAG: ${{ github.ref_name }}
        run: >-
          node --input-type=module -e
          "import pkg from './package.json' with { type: 'json' };
          if (process.env.RELEASE_TAG !== 'v' + pkg.version || !pkg.version.includes('-beta.'))
          throw new Error('Desktop preview tags must exactly match a beta package version.');"

      - name: Install dependencies
        run: npm ci
        env:
          NODE_AUTH_TOKEN: ${{ secrets.PACKAGES_TOKEN }}

      - name: Run unit and reproducibility checks
        run: |
          npm test
          npm run audit:staffpad
          npm run audit:nyquist
          npm run audit:aup4-interop

      - name: Build the website
        run: npm run build

      - name: Install Chromium for browser tests
        run: npx playwright install --with-deps chromium

      - name: Run browser workflows
        run: npm run test:browser

  package:
    name: Package ${{ matrix.product }} / ${{ matrix.target.platform }} / ${{ matrix.target.arch }}
    needs: quality
    timeout-minutes: 60
    strategy:
      fail-fast: false
      matrix:
        product: [soundscaper, framescaper]
        target:
          - runner: windows-2025
            platform: win
            arch: x64
          - runner: windows-11-arm
            platform: win
            arch: arm64
          - runner: macos-15-intel
            platform: mac
            arch: x64
          - runner: macos-15
            platform: mac
            arch: arm64
          - runner: ubuntu-22.04
            platform: linux
            arch: x64
          - runner: ubuntu-24.04-arm
            platform: linux
            arch: arm64
    runs-on: ${{ matrix.target.runner }}
    env:
      SCAPE_PRODUCT: ${{ matrix.product }}
    steps:
      - name: Check out source
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Set up Node.js
        uses: actions/setup-node@395ad3262231945c25e8478fd5baf05154b1d79f # v6.1.0
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci
        env:
          NODE_AUTH_TOKEN: ${{ secrets.PACKAGES_TOKEN }}

      - name: Stage the offline renderer and runtimes
        run: node scripts/desktop-prepare.mjs

      - name: Package ${{ matrix.product }} ${{ matrix.target.platform }} ${{ matrix.target.arch }}
        run: npx electron-builder --config electron-builder.config.cjs --${{ matrix.target.platform }} --${{ matrix.target.arch }} --publish never
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: 'false'

      - name: Install virtual display for Linux smoke
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install --yes xvfb

      - name: Smoke the hardened packaged application
        run: node scripts/desktop-smoke.mjs
        env:
          SOUNDSCAPER_SMOKE_XVFB: ${{ runner.os == 'Linux' && 'true' || 'false' }}

      - name: Retain the verified runtime manifest
        shell: bash
        run: |
          cp .desktop-build/stage-manifest.json "release/desktop/runtime-manifest-${{ matrix.product }}-${{ matrix.target.platform }}-${{ matrix.target.arch }}.json"
          cp desktop/ffmpeg-corresponding-source.json release/desktop/ffmpeg-corresponding-source.json

      - name: Upload ${{ matrix.product }} packages
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: nightly-${{ matrix.product }}-${{ matrix.target.platform }}-${{ matrix.target.arch }}
          path: |
            release/desktop/*.AppImage
            release/desktop/*.deb
            release/desktop/*.dmg
            release/desktop/*.exe
            release/desktop/*.zip
            release/desktop/*.json
          if-no-files-found: error
          retention-days: 14
