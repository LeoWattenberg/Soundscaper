name: Deploy Soundscaper

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: soundscaper-production
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
        env:
          NODE_AUTH_TOKEN: ${{ secrets.PACKAGES_TOKEN }}
      - name: Test
        run: npm test
      - name: Publish versioned FFmpeg runtime to R2
        run: npm run deploy:runtime
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          SOUNDSCAPER_R2_BUCKET: ${{ vars.SOUNDSCAPER_R2_BUCKET }}
      - name: Build
        run: npm run build
        env:
          ASTRO_SITE: https://soundscaper.org
          PUBLIC_AUDIO_EDITOR_V2: 'true'
          PUBLIC_FFMPEG_CORE_BASE_URL: https://assets.soundscaper.org/runtime/ffmpeg/0.12.10
      - name: Deploy to Cloudflare Pages
        run: npx --yes wrangler@4 pages deploy dist --project-name soundscaper --branch main
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
